<!-- Add inside <ossec_config> on /var/ossec/etc/ossec.conf -->

<!-- Enable vulnerability detection -->
<vulnerability-detection>
  <enabled>yes</enabled>
  <interval>5m</interval>
  <min_full_scan_interval>6h</min_full_scan_interval>
  <run_on_start>yes</run_on_start>
</vulnerability-detection>

<!-- Enable CIS-CAT integration (optional but impressive for portfolio) -->
<wodle name="open-scap">
  <disabled>no</disabled>
  <timeout>1800</timeout>
  <interval>1d</interval>
  <scan-on-start>yes</scan-on-start>
</wodle>

<!-- Syscheck (file integrity monitoring) -->
<syscheck>
  <frequency>300</frequency>
  <directories realtime="yes" report_changes="yes" check_all="yes">/etc,/usr/bin,/usr/sbin</directories>
  <directories realtime="yes" report_changes="yes" check_all="yes">/bin,/sbin,/boot</directories>
  <ignore>/etc/mtab</ignore>
  <ignore>/etc/hosts.deny</ignore>
</syscheck>
